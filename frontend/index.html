<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>股票顾问 - 智能操作提示系统</title>
  <meta name="description" content="基于四维度分析模型的A股股票操作提示系统，提供技术面、资金面、资讯面、情绪面综合买卖信号。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-base:       #060912;
      --bg-surface:    #0d1221;
      --bg-card:       #111827;
      --bg-card-hover: #161f32;
      --border:        rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.15);
      --text-primary:  #e8eaf0;
      --text-secondary:#a0aec0;
      --text-muted:    #718096;
      --accent:        #4f8ef7;
      --accent-glow:   rgba(79,142,247,0.25);
      --red-strong:    #c62828;
      --red-light:     #ef5350;
      --green-light:   #4caf50;
      --green-strong:  #2e7d32;
      --gold:          #f6c90e;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      /* animated mesh gradient background */
      background-image:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(79,142,247,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 100%, rgba(139,92,246,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(16,185,129,0.04) 0%, transparent 70%);
      background-attachment: fixed;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
